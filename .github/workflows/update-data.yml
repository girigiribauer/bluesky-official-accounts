name: Update Data

on:
  schedule:
    - cron: "0 * * * *"
  workflow_dispatch:

jobs:
  update:
    name: update
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Fetch latest edited time from Notion DBs
        id: check_notion
        env:
          NOTION_API_KEY: ${{ secrets.NOTION_API_KEY }}
          ACCOUNTLIST_DATABASE: ${{ secrets.ACCOUNTLIST_DATABASE }}
          NEWS_DATABASE: ${{ secrets.NEWS_DATABASE }}
          CATEGORY_DATABASE: ${{ secrets.CATEGORY_DATABASE }}
        run: |
          fetch_latest_time() {
            local db_id=$1
            curl -s -X POST "https://api.notion.com/v1/databases/${db_id}/query" \
              -H "Authorization: Bearer ${NOTION_API_KEY}" \
              -H "Notion-Version: 2022-06-28" \
              -H "Content-Type: application/json" \
              -d '{
                "page_size": 1,
                "sorts": [
                  {
                    "timestamp": "last_edited_time",
                    "direction": "descending"
                  }
                ]
              }' | jq -r '.results[0].last_edited_time // "none"'
          }

          echo "Fetching ACCOUNTLIST_DATABASE..."
          TIME_ACCOUNT=$(fetch_latest_time "$ACCOUNTLIST_DATABASE")
          echo "ACCOUNTLIST time: $TIME_ACCOUNT"

          echo "Fetching NEWS_DATABASE..."
          TIME_NEWS=$(fetch_latest_time "$NEWS_DATABASE")
          echo "NEWS time: $TIME_NEWS"

          echo "Fetching CATEGORY_DATABASE..."
          TIME_CATEGORY=$(fetch_latest_time "$CATEGORY_DATABASE")
          echo "CATEGORY time: $TIME_CATEGORY"

          COMBINED_TIME="${TIME_ACCOUNT}_${TIME_NEWS}_${TIME_CATEGORY}"
          echo "Combined string: $COMBINED_TIME"
          LATEST_HASH=$(echo -n "$COMBINED_TIME" | sha256sum | awk '{print $1}')

          echo "latest_hash=$LATEST_HASH" >> "$GITHUB_OUTPUT"

      - name: Ping Supabase to prevent auto-pause
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: |
          curl -s -o /dev/null "$SUPABASE_URL/rest/v1/" \
            -H "apikey: $SUPABASE_ANON_KEY"

      - name: Restore previous hash from cache
        id: cache_restore
        uses: actions/cache/restore@v4
        with:
          path: .notion-cache
          key: notion-cache-${{ steps.check_notion.outputs.latest_hash }}
          restore-keys: |
            notion-cache-

      - name: Check if update needed
        id: check_diff
        run: |
          PREVIOUS_HASH=""
          if [ -f .notion-cache/latest_hash.txt ]; then
            PREVIOUS_HASH=$(cat .notion-cache/latest_hash.txt)
          fi

          LATEST_HASH="${{ steps.check_notion.outputs.latest_hash }}"

          echo "Previous Hash: $PREVIOUS_HASH"
          echo "Latest Hash: $LATEST_HASH"

          if [ "$PREVIOUS_HASH" != "$LATEST_HASH" ]; then
            echo "Changes detected!"
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
          else
            echo "No changes detected. Skipping."
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout repository
        if: steps.check_diff.outputs.has_changes == 'true'
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        if: steps.check_diff.outputs.has_changes == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        if: steps.check_diff.outputs.has_changes == 'true'
        run: npm ci

      - name: Fetch data from Notion
        if: steps.check_diff.outputs.has_changes == 'true'
        env:
          NOTION_API_KEY: ${{ secrets.NOTION_API_KEY }}
          ACCOUNTLIST_DATABASE: ${{ secrets.ACCOUNTLIST_DATABASE }}
          NEWS_DATABASE: ${{ secrets.NEWS_DATABASE }}
          CATEGORY_DATABASE: ${{ secrets.CATEGORY_DATABASE }}
        run: npm run fetch

      - name: Push data to data branch
        if: steps.check_diff.outputs.has_changes == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # data/ を一時退避
          cp -r data /tmp/notion-data

          # data ブランチへ切り替え（なければ orphan で作成）
          if git ls-remote --exit-code origin data; then
            git switch data
          else
            git checkout --orphan data
            git rm -rf . 2>/dev/null || true
          fi

          mkdir -p data
          cp /tmp/notion-data/*.json data/

          git add data/
          if git diff --cached --quiet; then
            echo "No file changes."
          else
            git commit -m "chore: update data $(date -u +%Y-%m-%dT%H:%M:%SZ)"
            git push origin data
          fi

      - name: Save new hash to cache
        if: steps.check_diff.outputs.has_changes == 'true'
        uses: actions/cache/save@v4
        with:
          path: .notion-cache
          key: notion-cache-${{ steps.check_notion.outputs.latest_hash }}

name: Update Data

on:
  schedule:
    - cron: "0 * * * *"
  workflow_dispatch:

jobs:
  update:
    name: update
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Fetch data from Supabase
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SECRET_KEY: ${{ secrets.SUPABASE_SECRET_KEY }}
        run: npm run fetch

      - name: Push data to data branch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          cp -r data /tmp/supabase-data

          if git ls-remote --exit-code origin data; then
            git switch data
          else
            git checkout --orphan data
            git rm -rf . 2>/dev/null || true
          fi

          mkdir -p data
          cp /tmp/supabase-data/*.json data/

          git add data/
          if git diff --cached --quiet; then
            echo "No file changes."
          else
            git commit -m "chore: update data $(date -u +%Y-%m-%dT%H:%M:%SZ)"
            git push origin data
          fi
